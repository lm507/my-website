<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AngelBaby</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "微软雅黑", sans-serif;
            background: linear-gradient(135deg, #fdf2f8, #fce7f3);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #f472b6;
        }
        h1 {
            font-size: 28px;
            color: #be185d;
            margin-bottom: 10px;
        }
        .info {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="avatar" src="https://p.qqan.com/up/2021-6/16237447648354582.jpg" alt="AngelBaby">
        <h1>AngelBaby 杨颖</h1>
        <div class="info">
            出生日期：1989年2月28日<br>
            职业：演员、模特<br>
            代表作品：《奔跑吧兄弟》《微微一笑很倾城》《摩天大楼》
        </div>
    </div>
</body>
</html>
